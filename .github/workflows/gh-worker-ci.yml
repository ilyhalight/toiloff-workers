# ref: https://github.com/Cateds/opencode-stats/blob/master/.github/workflows/release.yml
name: CI

on:
  pull_request:
    paths:
      - "workers/gh-worker/**"
      - "!workers/gh-worker/**.md"
      - ".github/workflows/gh-worker-ci.yml"
  push:
    branches:
      - master
    paths:
      - "workers/gh-worker/**"
      - "!workers/gh-worker/**.md"
      - ".github/workflows/gh-worker-ci.yml"
  workflow_call:

env:
  BIN_NAME: gh-worker

jobs:
  build-linux:
    name: Build gh-worker for Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: gh-worker-x86_64-unknown-linux-gnu
            archive_name: gh-worker-x86_64-unknown-linux-gnu.tar.gz
          - target: x86_64-unknown-linux-musl
            artifact_name: gh-worker-x86_64-unknown-linux-musl
            archive_name: gh-worker-x86_64-unknown-linux-musl.tar.gz
    defaults:
      run:
        working-directory: ./workers/gh-worker
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build binaries
        run: cargo zigbuild --release --locked --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${BIN_NAME}"
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "${BIN_NAME}"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: workers/${{ env.BIN_NAME }}/dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    name: Create GitHub release
    # needs: [build-linux, build-macos, build-windows]
    # ! sorry it's so expensive
    needs: [build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
          tag_name: ${{ github.ref }}
          name: ${{ github.sha }}
          draft: true
          prerelease: false
          files: dist/*
          fail_on_unmatched_files: true
